  <style>
    :root{--p:#7C3AED;--pk:#EC4899;--grad:linear-gradient(135deg,#EC4899 0%,#8B5CF6 50%,#6D28D9 100%);--gs:linear-gradient(135deg,rgba(236,72,153,.08) 0%,rgba(139,92,246,.08) 100%);--t:#0F0A1E;--t2:#4B4569;--m:#8B82A7;--bg:#F9F9FB;--w:#fff;--b:rgba(124,58,237,.1);--b2:rgba(0,0,0,.06);--sh:0 1px 3px rgba(124,58,237,.07),0 1px 2px rgba(0,0,0,.04);--shm:0 4px 24px rgba(124,58,237,.10),0 2px 8px rgba(0,0,0,.05);--shl:0 20px 60px rgba(124,58,237,.10),0 8px 24px rgba(0,0,0,.06)}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);-webkit-font-smoothing:antialiased;overflow-x:hidden}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(249,249,251,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--b2);transition:box-shadow .3s}
    .nl{display:flex;align-items:center;gap:9px;text-decoration:none}
    .nl img{height:26px;width:auto;display:block}
    .nlt{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:18px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .nlinks{display:flex;align-items:center;gap:3px}
    .na{font-size:13.5px;font-weight:500;color:var(--t2);text-decoration:none;padding:7px 12px;border-radius:7px;transition:all .2s}
    .na:hover,.na.active{color:var(--p);background:var(--gs)}
    .nb{font-family:'DM Sans',sans-serif;font-size:13.5px;font-weight:600;color:#fff;background:var(--grad);border:none;padding:8px 17px;border-radius:7px;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 2px 10px rgba(124,58,237,.25)}
    .nb:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(124,58,237,.36)}
    .sl{font-size:11px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--p);margin-bottom:12px}
    .st{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(26px,3.8vw,42px);font-weight:700;line-height:1.14;letter-spacing:-.024em;color:var(--t);max-width:580px;margin-bottom:10px}
    .ss{font-size:15px;color:var(--t2);max-width:480px;line-height:1.6;margin-bottom:44px}
    .g{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .bp{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:#fff;background:var(--grad);border:none;padding:13px 26px;border-radius:9px;cursor:pointer;text-decoration:none;transition:all .22s;box-shadow:0 4px 18px rgba(124,58,237,.33);display:inline-flex;align-items:center;gap:7px}
    .bp:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,.44)}
    .bs{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;color:var(--t2);background:var(--w);border:1px solid var(--b2);padding:13px 26px;border-radius:9px;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:var(--sh)}
    .bs:hover{border-color:var(--b);color:var(--p);transform:translateY(-1px)}
    /* HERO SERVICIO */
    .hero{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:110px 24px 64px;position:relative;overflow:hidden}
    .o1{position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.10) 0%,transparent 70%);top:-150px;left:50%;transform:translateX(-50%);pointer-events:none}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--w);border:1px solid var(--b);border-radius:100px;padding:5px 14px 5px 9px;font-size:12.5px;font-weight:500;color:var(--p);margin-bottom:24px;box-shadow:var(--sh);animation:fu .5s ease both}
    .badge-dot{width:7px;height:7px;border-radius:50%;background:var(--grad)}
